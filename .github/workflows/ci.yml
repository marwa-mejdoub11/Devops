name: CI Pipeline

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — Lint + Test + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Tests
        working-directory: ./backend
        run: npm test

      - name: Scan dépendances
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Build image Docker backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }} ./backend

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

  frontend:
    name: Frontend — Build + Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build React
        working-directory: ./frontend
        run: npm run build

      - name: Build image Docker frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }} ./frontend

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest

  sonarcloud:
    name: SonarCloud — Analyse qualité
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
